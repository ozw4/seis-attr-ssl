input:
  amplitude_npy: /home/dcuser/data/NOPIMS/ENO0047389_0_00050_00400.npy
  normalization_stats_json: /workspace/artifacts/ssl/registry/normalization_stats/nopims/pretrain_v1/ENO0047389_0_00050_00400.normalization_stats.json
  assume_normalized: false

attributes:
  # nullにすると現在のMVP registry全10属性を出します。
  # 10属性だけなら show_raw_amplitude: false + grid_mode: "2x5" が見やすいです。
  # raw amplitudeも含める場合は show_raw_amplitude: true + grid_mode: "3x4" 推奨です。
  names:
    - amplitude_norm
    - phase_sin
    - phase_cos
    - instantaneous_frequency
    - spectral_low_ratio
    - spectral_mid_ratio
    - spectral_high_ratio
    - coherence
    - glcm_contrast
    - glcm_homogeneity

output:
  out_dir: /workspace/artifacts/ssl/visualizations/on_the_fly_attribute_compare
  stem: ENO0047389_0_00050_00400

visualization:
  # XYは z 固定。nullなら中央sliceです。
  xy_slice_index: null

  # XZは y 固定。nullなら中央sliceです。
  xz_slice_y_index: null

  # XY属性生成用のz方向compute window。
  # phase/frequency/spectral系はz方向FFTを使うため、小さすぎると見え方が変わります。
  xy_z_window: 256

  # XZ属性生成用のy方向compute window。
  # 大きくすると属性は安定しますが、メモリ消費が増えます。
  xz_y_window: 64

  # 10属性だけを2x5で表示する設定。
  show_raw_amplitude: 'true'
  grid_mode: "3x4"

  # raw amplitudeも含めたい場合は次に変更:
  # show_raw_amplitude: true
  # grid_mode: "3x4"

  clip_percentiles: [1.0, 99.0]
  use_known_ranges: true
  dpi: 200
  figure_height: 3.5
  panel_width: 3.5
  xy_aspect: equal
  xz_aspect: auto
