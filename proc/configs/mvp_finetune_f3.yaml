project:
  name: SeisAttrSSL
  package: seis_attr_ssl

paths:
  nopims_root: /home/dcuser/data/NOPIMS/
  output_root: runs

data:
  grid_order: [x, y, z]
  volume_format: npy_memmap
  base_seismic_kind: dip_steered_median_filtered
  attribute_mode: on_the_fly
  local_crop_size: [128, 128, 128]
  context_crop_size: [256, 256, 512]
  context_downsample: [2, 2, 4]
  use_context: true

attributes:
  names:
    - amplitude_norm
    - phase_sin
    - phase_cos
    - instantaneous_frequency
    - spectral_low_ratio
    - spectral_mid_ratio
    - spectral_high_ratio
    - coherence
    - glcm_contrast
    - glcm_homogeneity
  groups:
    amplitude_norm: waveform
    phase_sin: phase
    phase_cos: phase
    instantaneous_frequency: frequency
    spectral_low_ratio: spectral
    spectral_mid_ratio: spectral
    spectral_high_ratio: spectral
    coherence: discontinuity
    glcm_contrast: texture
    glcm_homogeneity: texture

normalization:
  pre_attribute:
    clipping_percentiles: [0.5, 99.5]
    center: median
    scale: iqr
    epsilon: 1.0e-6
    smooth_time_depth_trend_correction: false
    trace_wise_agc: false
    patch_wise_zscore: false

stage: finetune_f3

f3:
  data_root: null
  labels_root: null
  split:
    method: spatial_holdout
    axis: x
  few_label_protocols:
    - one_inline
    - three_inlines
    - five_inlines
    - sparse_points_per_class

model:
  init_from_dense_adapt: null
  num_classes: null
  prototype_head: true

loss:
  sparse_ce_weight: 1.0
  prototype_weight: 0.25
  subset_consistency_weight: 0.10
  smoothness_weight: 0.05

train:
  batch_size: 1
  epochs: 100
  schedule:
    - stage: train_head
      freeze_encoder: true
      freeze_decoder: true
    - stage: train_decoder
      freeze_encoder: true
      freeze_decoder: false
    - stage: train_last_encoder_blocks
      unfreeze_last_blocks: 2
    - stage: full_finetune
      encoder_lr_scale: 0.1
  amp: true
  seed: 42
